<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CBK Monthly — Treasury Dashboard</title>
<style>
:root{
  --ink:#1b2530; --muted:#7e8893; --faint:#aab3bc;
  --paper:#ffffff; --canvas:#f4f6f8; --line:#e4e8ec;
  --crimson:#bf3a30; --crimson-soft:#fdf1f0;
  --steel:#41698c; --band:#f4f8fa;
  --mono:'Consolas','SF Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--canvas);color:var(--ink);line-height:1.45}
.num{font-variant-numeric:tabular-nums}

header{background:var(--paper);border-bottom:2px solid var(--crimson);
  padding:20px 28px 14px;display:flex;justify-content:space-between;
  align-items:flex-end;gap:24px;flex-wrap:wrap}
.masthead h1{font-size:1.25rem;font-weight:700;letter-spacing:-.01em}
.masthead .sub{color:var(--muted);font-size:.78rem;margin-top:3px}
.masthead .xlink{display:inline-block;margin-top:6px;font-size:.72rem;
  font-weight:700;color:var(--crimson);text-decoration:none;
  border:1px solid var(--crimson);border-radius:6px;padding:3px 10px}
.masthead .xlink:hover{background:var(--crimson);color:#fff}
.kpis{display:flex;gap:10px;flex-wrap:wrap}
.kpi{border:1px solid var(--line);border-radius:6px;padding:9px 14px;
  min-width:138px;background:var(--paper);position:relative}
.kpi.dyn{border-left:3px solid var(--steel)}
.kpi .src{font-size:.58rem;color:var(--faint);margin-top:2px;
  font-family:var(--mono)}
.pinbtn{position:absolute;top:3px;right:6px;border:0;background:none;
  color:var(--faint);cursor:pointer;font-size:.85rem;line-height:1;
  padding:2px;font-family:inherit}
.pinbtn:hover{color:var(--crimson)}
.kpi .lbl{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--faint);font-weight:600}
.kpi .val{font-size:1.28rem;font-weight:700;letter-spacing:-.01em;margin-top:2px}
.kpi .dlt{font-size:.68rem;margin-top:1px;font-weight:600}
.up{color:#2e7d4f}.dn{color:var(--crimson)}.fl{color:var(--muted)}

.layout{display:flex;min-height:calc(100vh - 92px)}
#navtg{flex:none;width:16px;border:none;border-right:1px solid var(--line);
  background:var(--paper);color:var(--muted);cursor:pointer;font-size:.6rem;
  padding:0}
#navtg:hover{background:#eef1f4;color:var(--ink)}
.layout.navhide nav{display:none}
.navit .fmv{position:absolute;top:50%;transform:translateY(-50%);
  font-size:.72rem;color:#b6bfc7;padding:2px 3px;border-radius:3px}
.navit .fmv.up{right:46px}
.navit .fmv.dn{right:30px}
.navit .fmv:hover{color:var(--ink);background:#e8edf1}
.navit.infocus{padding-right:64px}
nav{width:264px;flex:none;background:var(--paper);border-right:1px solid var(--line);
  padding:14px 0 40px;overflow-y:auto;height:calc(100vh - 92px);position:sticky;top:0}
.search{margin:0 14px 12px}
.search input{width:100%;border:1px solid var(--line);border-radius:6px;
  padding:7px 10px;font-size:.8rem;outline:none}
.search input:focus{border-color:var(--steel)}
.grp{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--faint);font-weight:700;padding:14px 18px 5px;display:block;
  width:100%;text-align:left;border:0;background:none;cursor:pointer;
  font-family:inherit}
.grp:hover{color:var(--ink)}
.grp.on{color:var(--crimson)}
.grp .cv{display:inline-block;width:20px;margin-right:4px;color:var(--faint);
  font-size:.82rem;padding:2px 0}
.grp .gcount{margin-left:6px;color:var(--faint);font-weight:700;
  font-size:.62rem;letter-spacing:0}
.gcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
  gap:14px;margin-top:14px}
.gcard{border:1px solid var(--line);border-radius:7px;padding:12px 14px 10px;
  background:var(--paper)}
.gcard .ghead{display:flex;align-items:baseline;gap:8px}
.gcard .ttl{font-size:.74rem;font-weight:700;cursor:pointer;flex:1;
  min-width:0}
.gcard .ttl:hover{color:var(--crimson)}
.gcard .ttl .tid{font-family:var(--mono);font-size:.62rem;
  color:var(--muted);margin-right:5px}
.gstat{font-size:.68rem;color:var(--ink);margin-top:7px;
  font-variant-numeric:tabular-nums}
.gstat b{font-size:.84rem}
.gsub{font-size:.64rem;color:var(--muted);margin-top:3px;
  font-variant-numeric:tabular-nums}
.grev{font-size:.62rem;color:var(--crimson);margin-top:4px;font-weight:600}

/* GM scorecard */
.headline{background:var(--paper);border:1px solid var(--line);
  border-left:3px solid var(--crimson);border-radius:8px;padding:18px 22px;
  margin-bottom:18px}
.headline .eyebrow{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--faint);font-weight:700}
.headline .big{font-size:1.05rem;font-weight:600;line-height:1.5;margin-top:6px}
.headline .big .g,.headline .big .a,.headline .big .r{
  color:var(--ink);font-weight:700}
.headline .big .g{border-bottom:2px solid #9fc9ae}
.headline .big .a{border-bottom:2px solid #e4b877}
.headline .big .r{border-bottom:2px solid #d99a9a}
.scgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:14px;margin-bottom:18px}
.sc{background:var(--paper);border:1px solid var(--line);border-radius:8px;
  padding:16px 16px 14px;cursor:pointer;position:relative;overflow:hidden}
.sc:hover{border-color:var(--steel)}
.sc::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
.sc.green::before{background:#2e7d4f}
.sc.amber::before{background:#d98e3d}
.sc.red::before{background:var(--crimson)}
.sc .lbl{font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);font-weight:700}
.sc .row{display:flex;align-items:baseline;gap:8px;margin-top:5px}
.sc .v{font-size:1.7rem;font-weight:700;font-variant-numeric:tabular-nums;
  letter-spacing:-.02em}
.sc .u{font-size:.8rem;color:var(--muted);font-weight:600}
.sc .tr{font-size:.72rem;font-weight:700;margin-left:auto}
.sc .dot{display:inline-block;font-size:.62rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:3px;
  margin-top:8px}
.sc.green .dot{background:#e3f1e9;color:#2e7d4f}
.sc.amber .dot{background:#fbeed9;color:#a8641a}
.sc.red .dot{background:var(--crimson-soft);color:var(--crimson)}
.sc .msg{font-size:.74rem;color:var(--ink);margin-top:9px;line-height:1.4}
.sc-foot{font-size:.66rem;color:var(--faint);margin-top:7px}
.aread{background:var(--paper);border:1px solid var(--line);
  border-left:3px solid var(--steel);border-radius:8px;padding:16px 22px 18px;
  margin-bottom:18px}
.aread .eyebrow{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--faint);font-weight:700;margin-bottom:8px}
.aread ul{list-style:none;margin:0;padding:0}
.aread li{font-size:.82rem;line-height:1.55;padding:8px 0 8px 20px;
  position:relative;border-bottom:1px solid #f0f2f4;display:flex;
  align-items:center;gap:16px}
.aread li:last-child{border-bottom:0}
.aread li::before{content:"";position:absolute;left:2px;top:17px;width:7px;
  height:7px;border-radius:50%;background:var(--steel)}
.aread li.lead::before{background:var(--crimson)}
.aread li.lead{font-weight:500}
.aread .atext{flex:1;min-width:0}
.aread .aspark{flex:none;width:108px;text-align:right}
.aread .aspark .cap{font-size:.55rem;letter-spacing:.08em;
  text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:2px}
.aread .aspark .d{font-size:.66rem;font-weight:700;
  font-variant-numeric:tabular-nums}
@media(max-width:680px){.aread li{flex-direction:column;align-items:stretch}
  .aread .aspark{width:100%;text-align:left}}
.aread .dis{font-size:.64rem;color:var(--faint);margin-top:10px;
  font-style:italic}
.navit{display:block;width:100%;text-align:left;border:0;background:none;
  cursor:pointer;padding:6px 18px 6px 16px;font-size:.78rem;color:var(--ink);
  border-left:2px solid transparent;line-height:1.3;font-family:inherit}
.navit:hover{background:var(--band)}
.navit.on{border-left-color:var(--crimson);background:var(--crimson-soft);font-weight:600}
.navit .tid{color:var(--muted);font-size:.66rem;font-weight:700;
  font-family:var(--mono);margin-right:6px}
.navit.ov{font-weight:700;letter-spacing:.04em}

.fbar{background:var(--paper);border-bottom:1px solid var(--line);
  padding:8px 28px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fbar .flbl{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--faint);font-weight:700;margin-right:4px}
.fc{border:1px solid var(--line);background:var(--paper);border-radius:99px;
  padding:3px 11px;font-size:.7rem;cursor:pointer;color:var(--ink);
  font-family:inherit;font-variant-numeric:tabular-nums}
.fc:hover{border-color:var(--steel)}
.fc.on{background:#243240;border-color:#243240;color:#fff;font-weight:600}
.fc.yr.off{opacity:.42;text-decoration:line-through}
.fsep{width:1px;height:18px;background:var(--line);margin:0 6px}

main{flex:1;padding:22px 28px 60px;min-width:0}
.card{background:var(--paper);border:1px solid var(--line);border-radius:8px;
  border-left:3px solid var(--crimson);padding:18px 22px 20px;margin-bottom:18px}
.card.quiet{border-left-color:var(--steel)}
.cardhead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.cardhead h2{font-size:.85rem;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase}
.badge{font-size:.6rem;font-weight:700;letter-spacing:.08em;border-radius:3px;
  padding:2px 7px;text-transform:uppercase}
.badge.red{background:var(--crimson);color:#fff}
.badge.amber{background:#d98e3d;color:#fff}
.badge.gray{background:#e7ebef;color:#5c6670}
.cardsub{color:var(--muted);font-size:.74rem;margin-top:3px}
.calcbox{margin-top:10px;background:#f4f8fa;border:1px solid var(--line);
  border-radius:5px;padding:8px 12px;font-size:.74rem;color:var(--ink);
  line-height:1.45}
.calcbox .calclbl{display:block;font-size:.58rem;letter-spacing:.1em;
  text-transform:uppercase;color:var(--steel);font-weight:700;margin-bottom:3px}
.insight{margin-top:14px;background:var(--crimson-soft);
  border:1px solid #f0dcda;border-radius:5px;padding:8px 12px;font-size:.74rem}
.insight.gray{background:#f3f5f7;border-color:var(--line)}

.legend{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 4px}
.lg{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);
  border-radius:99px;padding:3px 10px;font-size:.68rem;cursor:pointer;
  background:var(--paper);color:var(--ink);font-family:inherit}
.lg .dot{width:8px;height:8px;border-radius:50%}
.lg.off{opacity:.38}
.chartwrap{position:relative}
svg text{font-family:-apple-system,'Segoe UI',sans-serif}
.tip{position:absolute;pointer-events:none;background:#fff;border:1px solid var(--line);
  border-radius:6px;box-shadow:0 4px 14px rgba(20,30,40,.12);padding:8px 11px;
  font-size:.7rem;display:none;z-index:5;min-width:150px}
.tip .t{font-weight:700;font-family:var(--mono);font-size:.66rem;
  color:var(--muted);margin-bottom:4px}
.tip .r{display:flex;justify-content:space-between;gap:14px}
.tip .r .v{font-weight:600;font-variant-numeric:tabular-nums}

.tblwrap{overflow-x:auto;margin-top:16px;border:1px solid var(--line);border-radius:6px}
table{border-collapse:collapse;width:100%;font-size:.72rem}
th{background:#243240;color:#fff;font-weight:600;text-align:right;
  padding:6px 8px;position:sticky;top:0;z-index:2;
  white-space:normal;word-break:normal;overflow-wrap:anywhere;
  vertical-align:bottom;min-width:58px;max-width:110px;line-height:1.22;
  font-size:.68rem}
th.ghdr{text-align:center;border-bottom:1px solid #3a4a5a;
  background:#2b3a48;font-weight:700}
th:first-child{text-align:left;font-family:var(--mono);font-size:.66rem;
  left:0;z-index:3;min-width:88px}
td{padding:4px 8px;text-align:right;border-bottom:1px solid #eef1f4;
  font-variant-numeric:tabular-nums;white-space:nowrap}
td:first-child{text-align:left;font-family:var(--mono);font-size:.66rem;
  color:var(--muted);font-weight:600;position:sticky;left:0;z-index:1;
  background:var(--paper)}
tr:nth-child(even) td{background:var(--band)}
tr:nth-child(even) td:first-child{background:#eef3f6}
td.neg{color:var(--crimson)}
/* summary rows - now at the BOTTOM (tfoot); separated from data by a rule */
th.sumtop,td.sumtop{background:#1b2530;font-size:.62rem;color:#9fb0bd;
  text-transform:uppercase;letter-spacing:.08em;font-weight:700;
  text-align:left;padding:6px 10px}
tfoot tr.sumtoprow td.sumtop{border-top:2px solid var(--steel)}
tr.sumrow td{background:#eef3f6;border-bottom:1px solid #dde4e9;
  font-weight:600;font-size:.68rem;padding:4px 10px}
tr.sumrow td.sumlbl{position:sticky;left:0;z-index:1;text-align:left;
  font-family:-apple-system,'Segoe UI',sans-serif;font-size:.6rem;
  letter-spacing:.06em;text-transform:uppercase;color:var(--steel);
  font-weight:700;background:#e4ecf1}
tr.sumrow td.sumcell.up{color:#2e7d4f}
tr.sumrow td.sumcell.dn{color:var(--crimson)}
tr.sumrow td.sumcell.fl{color:var(--muted)}
tr.sumrow td .sp{font-weight:500;opacity:.72;margin-left:4px;font-size:.62rem}
table.dsk{font-size:.76rem}
table.dsk td:first-child{font-family:inherit;font-size:.74rem;color:var(--ink);
  font-weight:600}
table.dsk .num{font-variant-numeric:tabular-nums}
table.dsk .num.up{color:#2e7d4f;font-weight:700}
table.dsk .num.dn{color:var(--crimson);font-weight:700}
.dchip{display:inline-block;border-radius:12px;padding:3px 10px;font-size:.7rem;
  font-weight:700;margin-right:6px;border:1px solid var(--line)}
.dchip.green{background:#eaf4ee;color:#2e7d4f;border-color:#cfe4d6}
.dchip.amber{background:#fdf3e4;color:#a8641a;border-color:#efd9b5}
.dchip.red{background:#fbeaea;color:var(--crimson);border-color:#eec7c7}
table.cmp th{text-align:center}
table.cmp td.cmplbl{font-weight:600}
table.cmp .sh{font-size:.62rem;color:var(--muted);font-weight:600}
table.cmp .lead{font-size:.64rem;font-weight:700;padding:2px 7px;
  border-radius:10px;white-space:nowrap}
table.cmp .lead.trad{background:#e8eef5;color:#2b5580}
table.cmp .lead.isl{background:#e9f2ec;color:#2e7d4f}
table.dsk .up{color:#2e7d4f}
table.dsk .dn{color:var(--crimson)}
.navit{position:relative;padding-right:30px}
.navit .fstar{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  font-size:.85rem;color:#c8ceD4;padding:2px 4px;border-radius:4px}
.navit .fstar:hover{color:#d4a017;background:#f6f1e4}
.navit .fstar.on{color:#d4a017}
.notebox{margin:14px 0 4px;border:1px solid #e6d9b8;border-radius:8px;
  background:#fdfaf1;padding:10px 12px}
.notebox.cmp{margin:10px 0 0;padding:8px 10px}
.nb-l{font-size:.66rem;font-weight:800;color:#a8781a;letter-spacing:.05em;
  text-transform:uppercase;margin-bottom:6px}
.nb-h{font-weight:500;color:#b9a97e;text-transform:none;letter-spacing:0;
  margin-left:6px}
.nb-t{width:100%;min-height:148px;border:1px solid #e8dfc6;border-radius:6px;
  padding:9px 11px;font:inherit;font-size:.78rem;line-height:1.55;
  color:var(--ink);background:#fff;resize:vertical;box-sizing:border-box}
.notebox.cmp .nb-t{min-height:110px;font-size:.74rem}
.nb-t:focus{outline:2px solid #d4a017;border-color:#d4a017}
.ctg{display:flex;gap:5px;margin-bottom:8px}
.ct{border:1px solid var(--line);background:var(--paper);border-radius:6px;
  padding:3px 10px;font-size:.66rem;font-weight:700;color:var(--muted);
  cursor:pointer}
.ct:hover{background:#eef1f4;color:var(--ink)}
.ct.on{background:#243240;color:#fff;border-color:#243240}
.grp.focus{color:#a8781a;font-weight:800}
.grp.ord{color:var(--steel)}
.grp.focus:hover{color:#7d5a12}
.hint2{font-size:.6rem;color:var(--faint);font-weight:400}
.glwrap{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.gl{border:1px solid var(--line);border-radius:7px;padding:10px 13px;background:var(--paper)}
.glt{font-weight:700;font-size:.78rem;margin-bottom:4px}
.gld{font-size:.72rem;color:var(--muted);line-height:1.5}
.tbltools{display:flex;gap:8px;margin-top:14px}
.xpd{border:1px solid var(--line);background:var(--paper);border-radius:6px;
  padding:5px 12px;font-size:.72rem;cursor:pointer;color:var(--ink);
  font-family:inherit;font-weight:600}
.xpd:hover{border-color:var(--steel);color:var(--steel)}
#tovl{display:none;position:fixed;inset:0;background:rgba(20,30,40,.55);
  z-index:50;flex-direction:column;padding:24px}
#tovl .ovbar{background:var(--paper);border-radius:8px 8px 0 0;
  padding:12px 18px;display:flex;justify-content:space-between;
  align-items:center;font-weight:700;font-size:.9rem;
  border-bottom:2px solid var(--crimson)}
#tovl .ovbar button{border:1px solid var(--line);background:var(--paper);
  border-radius:6px;padding:5px 12px;font-size:.74rem;cursor:pointer;
  font-family:inherit;font-weight:600}
#tovl .ovbar button:hover{border-color:var(--crimson);color:var(--crimson)}
#tovl .ovbody{background:var(--paper);border-radius:0 0 8px 8px;
  overflow:auto;flex:1;padding:0}
#tovl .tblwrap{margin:0;border:0;border-radius:0;height:100%}

/* overview */
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:14px;margin-top:14px}
.mini{border:1px solid var(--line);border-radius:7px;padding:12px 14px;cursor:pointer;
  background:var(--paper)}
.mini:hover{border-color:var(--steel)}
.mini .lbl{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--faint);font-weight:700}
.mini .big{font-size:1.35rem;font-weight:700;margin:2px 0 0}
.mini .dlt{font-size:.68rem;font-weight:600;margin-bottom:6px}
.movers{margin-top:6px}
.mv{display:flex;align-items:center;gap:12px;padding:8px 4px;cursor:pointer;
  border-bottom:1px solid #eef1f4;font-size:.76rem}
.mv:hover{background:var(--band)}
.mv .tid{font-family:var(--mono);font-size:.64rem;font-weight:700;
  color:var(--muted);width:46px;flex:none}
.mv .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mv .vv{font-variant-numeric:tabular-nums;font-weight:600;width:82px;
  text-align:right;flex:none}
.mv .pc{width:78px;text-align:right;font-weight:700;flex:none;
  font-variant-numeric:tabular-nums}
footer{color:var(--faint);font-size:.68rem;padding:8px 28px 26px;text-align:right}
@media(max-width:880px){nav{display:none}main{padding:16px 12px}}
@media print{
  nav,.fbar,.tbltools,#tovl,.legend{display:none!important}
  body{background:#fff}
  .layout{display:block}
  main{padding:0;max-width:100%}
  header{position:static;box-shadow:none;border-bottom:2px solid #333}
  .card{break-inside:avoid;box-shadow:none;border:1px solid #ccc;
    margin-bottom:10px}
  .kpis{display:flex}
  th{position:static}
  td:first-child,tr.sumrow td.sumlbl{position:static}
}
</style></head><body>
<header>
  <div class="masthead">
    <h1>Central Bank of Kuwait — Monthly Statistics</h1>
    <div class="sub" id="coverage"></div>
    <a id="xlink" class="xlink" href="#"></a>
    <a id="xlink2" class="xlink" href="#"></a>
  </div>
  <div class="kpis" id="kpis"></div>
</header>
<div class="fbar" id="fbar"></div>
<div class="layout" id="layout">
  <nav id="nav"><div class="search"><input id="q" placeholder="Filter tables…"></div></nav>
  <button id="navtg" title="Hide / show the table list">◀</button>
  <main id="main"></main>
</div>
<footer>Source: Central Bank of Kuwait, monthly statistical release · values in

  const dp=a>=1000?0:a>=100?1:a>=10?2:3;
  return v.toLocaleString('en-US',{minimumFractionDigits:0,

  const n=ps.length;if(!n)return null;
  const last=ps[n-1],v=t.rows[last][ci];
  const pct=(a,b)=>(typeof b==='number'&&b)?(a-b)/Math.abs(b)*100:null;
  const rows=[];
  const [y,m]=last.split('-');
  const py=pct(v,t.rows[(y-1)+'-'+m]?.[ci]);
  if(py!=null)rows.push(['YoY',py]);
  if(n>=2){const mm=pct(v,t.rows[ps[n-2]][ci]);if(mm!=null)rows.push(['MoM',mm]);}
  if(n>=4){
    const a3=(t.rows[ps[n-2]][ci]+t.rows[ps[n-3]][ci]+t.rows[ps[n-4]][ci])/3;
    const p3=pct(v,a3);if(p3!=null)rows.push(['vs 3M avg',p3]);
  }
  return {v,rows};
}

function renderKpis(curTid){

  for(const [lbl,tid,ci] of DATA.kpis){

  for(const p of PINNED){

    const t=DATA.tables[p.tid];if(!t)continue;
    const c=kpiCard(t.columns[p.ci],p.tid,p.ci,'pin');
    if(c){h+=c;used.add(k);n++;}
  }

    const t=DATA.tables[curTid];
    for(let ci=0;ci<t.columns.length&&n<MAXDYN;ci++){

      const c=kpiCard(t.columns[ci],curTid,ci,'auto');
      if(c){h+=c;used.add(k);n++;}
    }

function deskSheet(main){
  const T=DATA.tables;
  const mons=t=>Object.keys(t.rows).filter(p=>/^\d{4}-\d{2}$/.test(p)).sort();
  const lastN=(t,ci,n)=>{const ms=mons(t).filter(p=>typeof t.rows[p][ci]==='number');
    return ms.slice(-n).map(p=>[p,t.rows[p][ci]]);};
  // average of the 3 months PRIOR to the latest (for vs-3M-avg comparisons)
  const avg3=(t,ci)=>{const ms=mons(t).filter(p=>typeof t.rows[p][ci]==='number');
    const w=ms.slice(-4,-1).map(p=>t.rows[p][ci]);
    return w.length?w.reduce((s,x)=>s+x,0)/w.length:null;};
  const bps=x=>(x>0?'+':'')+Math.round(x)+' bps';
  const cls=x=>x>0.4?'up':x<-0.4?'dn':'fl';
  const tenorRows=(t,suffixA,suffixB)=>{
    // group columns by tenor prefix ("1-Month / Offer" -> "1-Month")
    const seen=[],map={};
    t.columns.forEach((c,i)=>{const parts=c.split(' / ');
      if(parts.length<2)return;const ten=parts[0],leg=parts[1];
      if(!map[ten]){map[ten]={};seen.push(ten);}map[ten][leg]=i;});
    return {seen,map};
  };
  // --- Card A: interbank KD (T21) --------------------------------------
  let html='';
  const t21=T['21'];
  if(t21){
    const {seen,map}=tenorRows(t21);
    let rows='';
    for(const ten of seen){
      const io=map[ten]['Offer'],ib=map[ten]['Bid'];
      if(io==null)continue;
      const so=lastN(t21,io,2),sb=ib!=null?lastN(t21,ib,1):[];
      if(!so.length)continue;
      const v=so[so.length-1][1],pv=so.length>1?so[0][1]:null;
      const d=pv!=null?(v-pv)*100:null;
      const a3=avg3(t21,io);const d3=a3!=null?(v-a3)*100:null;
      rows+='<tr><td>'+ten+'</td><td class="num">'+v.toFixed(3)+'</td>'+
        '<td class="num">'+(sb.length?sb[0][1].toFixed(3):'\u2013')+'</td>'+
        '<td class="num '+(d!=null?cls(d):'')+'">'+(d!=null?bps(d):'\u2013')+'</td>'+
        '<td class="num '+(d3!=null?cls(d3):'')+'">'+(d3!=null?bps(d3):'\u2013')+'</td></tr>';
    }
    html+='<div class="card"><div class="cardhead"><h2>Interbank KD rates</h2>'+
      '<span class="badge red">'+per2lab(DATA.asof)+'</span></div>'+
      '<div class="cardsub">Averages of declared inter-local-bank rates on KD '+
      'deposits (Table 21) \u00b7 \u0394 in bps vs prior month and vs 3-month average</div>'+
      '<div class="tblwrap"><table class="dsk"><thead><tr><th>Tenor</th>'+
      '<th>Offer %</th><th>Bid %</th><th>\u0394 Offer MoM</th>'+
      '<th>\u0394 vs 3M avg</th></tr></thead>'+
      '<tbody>'+rows+'</tbody></table></div>'+
      '<div class="sc-foot" style="margin-top:8px;cursor:pointer" '+
      'onclick="show(\'21\')">full table & chart \u2192</div></div>';
  }
  // --- Card B: customer deposit rates KD vs USD (T20) -------------------
  const t20=T['20'];
  if(t20){
    const {seen,map}=tenorRows(t20);
    let rows='';
    for(const ten of seen){
      const ik=map[ten]['KD'],iu=map[ten]['US$'];
      if(ik==null||iu==null)continue;
      const sk=lastN(t20,ik,2),su=lastN(t20,iu,2);
      if(!sk.length||!su.length)continue;
      const kd=sk[sk.length-1][1],us=su[su.length-1][1],dif=(kd-us)*100;
      let dd=null;
      if(sk.length>1&&su.length>1)dd=dif-(sk[0][1]-su[0][1])*100;
      const ak=avg3(t20,ik),au=avg3(t20,iu);
      const d3=(ak!=null&&au!=null)?dif-(ak-au)*100:null;
      rows+='<tr><td>'+ten+'</td><td class="num">'+kd.toFixed(3)+'</td>'+
        '<td class="num">'+us.toFixed(3)+'</td>'+
        '<td class="num" style="font-weight:700">'+Math.round(dif)+' bps</td>'+
        '<td class="num '+(dd!=null?cls(dd):'')+'">'+(dd!=null?bps(dd):'\u2013')+'</td>'+
        '<td class="num '+(d3!=null?cls(d3):'')+'">'+(d3!=null?bps(d3):'\u2013')+'</td></tr>';
    }
    html+='<div class="card"><div class="cardhead"><h2>Customer time deposits '+
      '\u2014 KD vs US$</h2><span class="badge amber">differential</span></div>'+
      '<div class="cardsub">Average rates on customer time deposits (Table 20) '+
      '\u00b7 differential = KD \u2212 US$ \u00b7 \u0394 vs prior month and vs 3-month average</div>'+
      '<div class="tblwrap"><table class="dsk"><thead><tr><th>Tenor</th>'+
      '<th>KD %</th><th>US$ %</th><th>KD\u2212US$</th><th>\u0394 diff MoM</th>'+
      '<th>\u0394 vs 3M avg</th>'+
      '</tr></thead><tbody>'+rows+'</tbody></table></div>'+
      '<div class="sc-foot" style="margin-top:8px;cursor:pointer" '+
      'onclick="show(\'20\')">full table & chart \u2192</div></div>';
  }
  // --- Card C: funding ladder (T18) --------------------------------------
  const t18=T['18'];
  if(t18){
    const ms=mons(t18);
    const last=ms[ms.length-1],prev=ms[ms.length-2];
    const ti=t18.columns.findIndex(c=>/^Total$/.test(c));
    const tot=t18.rows[last][ti],ptot=prev?t18.rows[prev][ti]:null;
    // prior-3-month average share for each bucket
    const prior3=ms.slice(-4,-1);
    const avgShare=(i)=>{const vals=prior3.map(p=>{
      const tt=t18.rows[p][ti];const vv=t18.rows[p][i];
      return (typeof tt==='number'&&tt&&typeof vv==='number')?vv/tt*100:null;
    }).filter(x=>x!=null);
      return vals.length?vals.reduce((s,x)=>s+x,0)/vals.length:null;};
    let rows='';
    t18.columns.forEach((c,i)=>{
      if(i===ti)return;
      const v=t18.rows[last][i];
      if(typeof v!=='number')return;   // retired historical buckets skip
      const sh=v/tot*100;
      let dsh=null;
      if(ptot&&typeof t18.rows[prev][i]==='number')
        dsh=sh-t18.rows[prev][i]/ptot*100;
      const a3=avgShare(i);const d3=a3!=null?sh-a3:null;
      rows+='<tr><td>'+c+'</td><td class="num">'+fmt(v)+'</td>'+
        '<td class="num">'+sh.toFixed(1)+'%</td>'+
        '<td class="num '+(dsh!=null?cls(dsh*2):'')+'">'+
        (dsh!=null?(dsh>0?'+':'')+dsh.toFixed(1)+' pp':'\u2013')+'</td>'+
        '<td class="num '+(d3!=null?cls(d3*2):'')+'">'+
        (d3!=null?(d3>0?'+':'')+d3.toFixed(1)+' pp':'\u2013')+'</td></tr>';
    });
    html+='<div class="card"><div class="cardhead"><h2>Funding ladder \u2014 '+
      'residual maturity</h2><span class="badge gray">Table 18</span></div>'+
      '<div class="cardsub">Liabilities to residents & non-residents by '+
      'residual maturity \u00b7 share of total, MoM shift and vs 3-month average</div>'+
      '<div class="tblwrap"><table class="dsk"><thead><tr><th>Bucket</th>'+
      '<th>KD mn</th><th>Share</th><th>\u0394 share MoM</th>'+
      '<th>\u0394 vs 3M avg</th></tr></thead>'+
      '<tbody>'+rows+'</tbody></table></div>'+
      '<div class="sc-foot" style="margin-top:8px;cursor:pointer" '+
      'onclick="show(\'18\')">full table & chart \u2192</div></div>';
  }
  // --- Card C2: where public money sits (Traditional vs Islamic) --------
  if(T['11-A']&&T['11-B']){
    const gsplit=(rx)=>{
      const gv=(tid)=>{const t=T[tid];const ci=t.columns.findIndex(c=>new RegExp(rx).test(c));
        if(ci<0)return null;const ms=Object.keys(t.rows).filter(p=>/^\d{4}-\d{2}$/.test(p)&&typeof t.rows[p][ci]==='number').sort();
        return ms.length?t.rows[ms[ms.length-1]][ci]:null;};
      return [gv('11-A'),gv('11-B')];
    };
    const mk=(lbl,rx)=>{
      const [a,b]=gsplit(rx);if(a==null||b==null)return '';
      const tot=a+b,sa=a/tot*100;
      return '<tr><td>'+lbl+'</td><td class="num">'+fmt(a)+'</td>'+
        '<td class="num">'+fmt(b)+'</td><td class="num" style="font-weight:700">'+
        (sa>=50?'Trad '+sa.toFixed(0)+'%':'Islamic '+(100-sa).toFixed(0)+'%')+
        '</td></tr>';
    };
    let rows=mk('Government deposits','Government Deposits')+
      mk('Public-institution deposits','Public Institutions.*Total')+
      mk('Private KD sight','Sight Deposits in KD')+
      mk('Foreign liabilities','Foreign Liabilities');
    html+='<div class="card"><div class="cardhead"><h2>Where public money sits'+
      '</h2><span class="badge gray">Trad vs Islamic</span></div>'+
      '<div class="cardsub">KD million held by each segment \u00b7 who carries '+
      'the larger share \u00b7 full breakdown in \u201cTraditional vs Islamic\u201d</div>'+
      '<div class="tblwrap"><table class="dsk"><thead><tr><th>Deposit type</th>'+
      '<th>Traditional</th><th>Islamic</th><th>Larger</th></tr></thead><tbody>'+
      rows+'</tbody></table></div>'+
      '<div class="sc-foot" style="margin-top:8px;cursor:pointer" '+
      'onclick="show(\'__cmp__\')">full comparison \u2192</div></div>';
  }

  // --- Card D: desk read + signal chips (omitted in the Clear build) ----
  if(DATA.profile!=='mmc'){
    let chips='';
    (DATA.scorecard||[]).forEach(x=>{
      chips+='<span class="dchip '+x.status+'">'+x.label+' '+

      reads+='<li>'+x.text+'</li>';

    html+='<div class="card quiet"><div class="cardhead"><h2>Desk read</h2>'+

        'materiality gate.</div>')+
      '<div class="cardsub" style="margin-top:10px">Generated by a fixed rule '+
      'set \u00b7 review before external use</div></div>';
  }
  main.insertAdjacentHTML('beforeend',html);
}

  rows+=row('Claims on private sector','10-A','10-B','Claims on Private.*Total','(broader than loans: includes banks\\u2019 domestic investments and CDs held)');
  rows+=row('Claims on government','10-A','10-B','Claims on Government / Total');
  rows+=row('Foreign assets','10-A','10-B','Foreign Assets');
  rows+=row('Foreign liabilities','11-A','11-B','Foreign Liabilities');
  main.insertAdjacentHTML('beforeend',
    '<div class="card"><div class="cardhead"><h2>Traditional vs Islamic banks</h2>'+
    '<span class="badge red">'+per2lab(DATA.asof)+'</span></div>'+
    '<div class="cardsub">Where government &amp; public money sits, and how each '+
    'segment\\u2019s balance sheet is growing \\u00b7 KD million, with MoM / YoY change '+
    'and the segment holding the larger share</div>'+
    '<div class="tblwrap"><table class="dsk cmp"><thead>'+
    '<tr><th rowspan="2">Metric</th><th colspan="3">Traditional</th>'+
    '<th colspan="3">Islamic</th><th rowspan="2">Larger share</th></tr>'+

    '</thead><tbody>'+rows+'</tbody></table></div>'+

    'portion of the two-bank total for that line. Source: Tables 10-A/10-B '+
    '(assets), 11-A/11-B (liabilities). Per the CBK definition, \\u201cLocal Banks\\u201d includes foreign banks\\u2019 branches; the Traditional segment is conventional + foreign-branch, not Kuwaiti conventional alone.</div></div>');

/* ---------- grouped table headers (reconstructs CBK's header tree) ---- */
function headerRows(columns, firstLabel){
  const parts=columns.map(c=>c.split(' / ').map(x=>x.trim()));
  const depth=Math.max.apply(null,[1].concat(parts.map(p=>p.length)));
  let html='';
  for(let L=0;L<depth;L++){
    let row='<tr>';
    if(L===0)row+='<th rowspan="'+depth+'">'+firstLabel+'</th>';
    let i=0;
    while(i<columns.length){
      const p=parts[i];
      if(p.length<=L){i++;continue;}          // covered by an earlier rowspan
      if(p.length===L+1){                      // leaf at this level
        row+='<th rowspan="'+(depth-L)+'">'+p[L]+'</th>';i++;continue;
      }
      // group: merge consecutive deeper columns sharing this prefix
      let j=i+1;
      const key=p.slice(0,L+1).join('\u0000');
      while(j<columns.length&&parts[j].length>L+1&&
            parts[j].slice(0,L+1).join('\u0000')===key)j++;
      row+='<th colspan="'+(j-i)+'" class="ghdr">'+p[L]+'</th>';
      i=j;
    }
    html+=row+'</tr>';
  }
  return html;
}
function stickyHeaderOffsets(scope){
  // multi-row sticky headers need cumulative top offsets
  const rows=(scope||document).querySelectorAll('thead tr');
  let off=0;
  rows.forEach(r=>{
    r.querySelectorAll('th').forEach(th=>{th.style.top=off+'px';});
    off+=r.offsetHeight;
  });
}

/* ---------- CBK official definitions (glossary) ---------- */
const GLOSSARY=[
 ["Currency in Circulation","Currency outside the vaults of the CBK: the amount of currency issued by the CBK and held by residents and non-residents."],
 ["Currency in Circulation Outside the Local Banks","Currency in circulation minus the currency in the vaults of local banks. This is the concept M1 is built on."],
 ["Monetary Base / Money Supply (M0)","Currency in circulation plus demand and time deposits of local banks and other resident financial institutions with the CBK. The narrowest definition of money supply."],
 ["Money (M1)","Currency in circulation outside the local banks plus sight deposits with local banks (private deposits in KD)."],
 ["Quasi-money","Balances of savings deposits (KD) + time deposits (KD) + foreign-currency deposits + CDs (KD) that the private sector maintains with local banks."],
 ["Certificates of Deposit","Negotiable financial papers denominated in KD. Quasi-money includes the portion of CDs issued by local banks and held by parties other than the banks themselves."],
 ["Money Supply (M2)","Money (M1) + quasi-money. The broad definition used across this dashboard."],
 ["Money Supply (M3)","M2 plus private-sector deposits with deposit-accepting investment companies. CBK defines the series but no longer publishes it monthly."],
 ["Claims on the Private Sector","Credit facilities extended by local banks to the private sector + domestic investments (listed and non-listed) by local banks + CDs issued by non-banking private units and held by local banks. Broader than loans alone."],
 ["Credit Facilities","Discounts and advances by local banks to residents - overdrafts or purpose/term loans, in local or foreign currency, to individuals and non-bank companies and institutions."],
 ["Government","Ministries, governmental departments and sectors under the Government\u2019s Financial Statement, as well as Kuwait Credit Bank. Note: KCB flows can move the government-deposit line."],
 ["Local Banks","All Kuwaiti banks plus foreign banks\u2019 branches licensed to operate in Kuwait. The Traditional segment in this dashboard therefore includes foreign branches, not only Kuwaiti conventional banks."],
 ["Public Institution Deposits","Institutions wholly or partially government-owned (50% of capital or more), split into public financial institutions and public non-financial institutions."],
 ["Other Liabilities with Local Banks","Includes matured time deposits without renewal instructions, salary-related balances at branches, funds due to L/C commission agents, transfers to customers without identified accounts, suspense accounts, and other liabilities."],
 ["Exchange Companies","Companies subject to CBK supervision licensed for exchange activities (currencies, travellers cheques, drafts, precious metals, collections). Excludes individually-owned exchange institutions outside CBK supervision."],
 ["Investment / Finance Companies","Conventional and Islamic investment/finance companies registered with the CBK. Supervision of investment companies moved to the CMA on 13 Sep 2011; the CBK role is confined to their financial activity."]
];
function glossary(main){
  let rows='';
  for(const [term,def] of GLOSSARY){
    rows+='<div class="gl"><div class="glt">'+term+'</div>'+
      '<div class="gld">'+def+'</div></div>';
  }
  main.insertAdjacentHTML('beforeend',
    '<div class="card"><div class="cardhead"><h2>Definitions</h2>'+
    '<span class="badge gray">CBK official</span></div>'+
    '<div class="cardsub">Taken from the CBK\u2019s Monthly Monetary '+
    'Statistics definitions page - the source\u2019s own wording, lightly '+
    'condensed. Every term below is used somewhere in this dashboard.</div>'+
    '<div class="glwrap">'+rows+'</div></div>');
}

function summaryHeadFor(id){
  // Stable summary rows from the FULL series (ignore period filter): always
  // the true latest month. Absolute + % for balances; absolute only for rates.
  const t=DATA.tables[id];
  if(t.layout==='raw')return '';
  const allp=Object.keys(t.rows).filter(p=>/^\d{4}-\d{2}$/.test(p)).sort();
  if(allp.length<2)return '';
  const last=allp[allp.length-1], at=p=>t.rows[p]||[];
  const lastY=+last.slice(0,4),lastM=last.slice(5);
  const yagoP=(lastY-1)+'-'+lastM, decP=(lastY-1)+'-12', prevP=allp[allp.length-2];
  const a3=ci=>{const w=allp.slice(-4,-1).map(p=>at(p)[ci])
    .filter(v=>typeof v==='number');
    return w.length?w.reduce((s,v)=>s+v,0)/w.length:null;};
  const isRate=RATE_TABLES.has(id)||t.derived;
  const cell=(cur,base)=>{
    if(typeof cur!=='number'||typeof base!=='number')
      return '<td class="sumcell fl">·</td>';
    const abs=cur-base, cls=abs>0?'up':abs<0?'dn':'fl';
    const av=Math.abs(abs);
    const a=(abs>0?'+':'')+(av>=10?Math.round(abs).toLocaleString('en-US')
      :av>=1?abs.toFixed(1):abs.toFixed(2));
    if(isRate)return '<td class="sumcell '+cls+'">'+a+'</td>';
    const pct=base?(abs/Math.abs(base)*100):null;
    const pc=pct==null?'':'<span class="sp">'+(pct>0?'+':'')+pct.toFixed(1)+'%</span>';
    return '<td class="sumcell '+cls+'">'+a+pc+'</td>';
  };
  const mk=(lbl,baseP,tip)=>{
    let r='<tr class="sumrow"><td class="sumlbl" title="'+tip+'">'+lbl+'</td>';
    t.columns.forEach((c,ci)=>{
      const base=baseP==='__3m__'?a3(ci):at(baseP)[ci];
      r+=cell(at(last)[ci],base);
    });
    return r+'</tr>';
  };
  let h=mk('MoM',prevP,'Change vs previous month ('+per2lab(prevP)+')');
  h+=mk('vs 3M avg','__3m__','Latest vs average of prior 3 months');
  if(t.rows[yagoP])h+=mk('YoY',yagoP,'Change vs same month last year ('+per2lab(yagoP)+')');
  if(t.rows[decP])h+=mk('YTD',decP,'Change since December '+(lastY-1));
  return h;
}

function chart(host,t,opts){
  opts=opts||{};
  const ps=filt(Object.keys(t.rows).sort());
  const ncol=t.columns.length;
  const only=opts.only;
  // main table charts start empty (user ticks what to graph) but remember the

  const saved=opts.tid?SEL[opts.tid]:null;
  const on=Array.from({length:ncol},(_,i)=>only?only.includes(i)
    :(saved?saved.includes(i):false));
  function remember(){
    if(!opts.tid)return;
    SEL[opts.tid]=on.map((v,i)=>v?i:-1).filter(i=>i>=0);
    try{localStorage.setItem('cbk_sel',JSON.stringify(SEL));}catch(e){}
  }
  const wrap=document.createElement('div');

  const tip=document.createElement('div');tip.className='tip';

    [['line','\u2015 Line'],['bar','\u2590\u258c Bar'],['pie','\u25d4 Pie']].forEach(([k,lab])=>{
      const b=document.createElement('button');b.className='ct';b.dataset.k=k;
      b.textContent=lab;
      b.onclick=()=>{CTYPE[opts.tid]=k;
        try{localStorage.setItem('cbk_ctype',JSON.stringify(CTYPE));}catch(e){}
        tg.querySelectorAll('.ct').forEach(x=>x.classList.toggle('on',x.dataset.k===k));

    });

  }
  if(!opts.mini){
    const leg=document.createElement('div');leg.className='legend';
    t.columns.forEach((c,i)=>{
      const b=document.createElement('button');b.className='lg'+(on[i]?'':' off');
      b.innerHTML='<span class="dot" style="background:'+PAL[i%8]+'"></span>'+
        (c.length>34?c.slice(0,33)+'…':c);
      b.title=c;
      b.onclick=()=>{on[i]=!on[i];b.classList.toggle('off',!on[i]);remember();draw();};
      leg.appendChild(b);
    });
    wrap.appendChild(leg);
  }
  wrap.appendChild(cw);cw.appendChild(tip);host.appendChild(wrap);

  function draw(){
    const old=cw.querySelector('svg');if(old)old.remove();
    const ctype=opts.mini?'line'
      :(opts.tid&&CTYPE[opts.tid])||(t.flow?'bar':'line');
    const tgEl=wrap.querySelector('.ctg');
    if(tgEl)tgEl.querySelectorAll('.ct').forEach(x=>
      x.classList.toggle('on',x.dataset.k===ctype));
    const W=Math.max(cw.clientWidth||860,opts.mini?200:560),
          H=opts.mini?64:300,
          L=opts.mini?2:56,R=opts.mini?2:14,T=opts.mini?4:14,B=opts.mini?4:34;
    let lo=Infinity,hi=-Infinity;
    ps.forEach(p=>t.rows[p].forEach((v,i)=>{
      if(on[i]&&typeof v==='number'){lo=Math.min(lo,v);hi=Math.max(hi,v);}}));
    if(!isFinite(lo)){lo=0;hi=1;}
    if(lo===hi){lo-=1;hi+=1;}
    // bars always measure from zero - anything else misleads
    if(ctype==='bar'){if(lo>0)lo=0;if(hi<0)hi=0;}
    else{const pad=(hi-lo)*.05;lo-=pad;hi+=pad;}
    // round the scale to "nice" steps: ticks land on clean numbers and the
    // domain expands to the tick bounds, so nothing can overflow the plot
    const nice=r=>{const m=Math.pow(10,Math.floor(Math.log10(Math.abs(r)||1)));
      const n=r/m;return (n<=1?1:n<=2?2:n<=2.5?2.5:n<=5?5:10)*m;};
    const step=nice((hi-lo)/5)||1;
    lo=Math.floor(lo/step)*step;hi=Math.ceil(hi/step)*step;
    const ticks=[];for(let tv=lo;tv<=hi+step*1e-6;tv+=step)ticks.push(tv);
    const x=i=>L+(W-L-R)*(ps.length<2?0.5:i/(ps.length-1));

    if(!opts.mini&&ctype!=='pie'){

        add('text',{x:L-8,y:yy+3,'text-anchor':'end','font-size':10,fill:'#9aa4ad'},fmtAx(v));
      });
      const lstep=Math.max(1,Math.ceil(ps.length/10));
      ps.forEach((p,i)=>{

        if(i===ps.length-1&&ps.length>1&&(ps.length-1)%lstep!==0&&
           xpos(i)-xpos(Math.floor((ps.length-2)/lstep)*lstep)<44)return; // avoid label collision
        const px=xpos(i);
        const anc=px>W-R-26?'end':px<L+26?'start':'middle';
        add('text',{x:px,y:H-12,'text-anchor':anc,'font-size':10,
          fill:'#9aa4ad'},per2lab(p));});
      if(lo<0&&hi>0)add('line',{x1:L,x2:W-R,y1:y(0),y2:y(0),stroke:'#c4ccd3'});
    }
    const onIdx=t.columns.map((c,i)=>i).filter(i=>on[i]);
    if(ctype==='pie'&&!opts.mini&&onIdx.length){
      // composition of the LATEST month across the selected series
      const lp=ps[ps.length-1];
      const vals=onIdx.map(i=>({i,v:t.rows[lp][i]}))
        .filter(x=>typeof x.v==='number'&&x.v>0);
      const tot=vals.reduce((s0,x)=>s0+x.v,0);
      const cx=(L+W-R)/2,cy=T+(H-T-B)/2,rr=Math.min(W-L-R,H-T-B)*0.40;
      if(!tot){
        add('text',{x:cx,y:cy,'text-anchor':'middle','font-size':12,
          fill:'#aab3bc'},'No positive values in the latest month to compose');
      }else{
        let a0=-Math.PI/2;
        vals.forEach(x=>{
          const frac=x.v/tot,a1=a0+frac*2*Math.PI;
          const large=frac>0.5?1:0;
          const x0=cx+rr*Math.cos(a0),y0=cy+rr*Math.sin(a0);
          const x1=cx+rr*Math.cos(a1),y1=cy+rr*Math.sin(a1);
          const path=frac>=0.9999
            ?'M'+cx+' '+(cy-rr)+'A'+rr+' '+rr+' 0 1 1 '+(cx-0.01)+' '+(cy-rr)+'Z'
            :'M'+cx+' '+cy+'L'+x0.toFixed(1)+' '+y0.toFixed(1)+
             'A'+rr+' '+rr+' 0 '+large+' 1 '+x1.toFixed(1)+' '+y1.toFixed(1)+'Z';
          const sl=add('path',{d:path,fill:PAL[x.i%8],opacity:.9,
            stroke:'#fff','stroke-width':1});
          const c=t.columns[x.i];
          sl.appendChild(document.createElementNS(ns,'title')).textContent=
            c+' \u2014 '+fmt(x.v)+' ('+(frac*100).toFixed(1)+'%)';
          if(frac>=0.04){
            const am=(a0+a1)/2,lx=cx+rr*0.66*Math.cos(am),
                  ly=cy+rr*0.66*Math.sin(am);
            add('text',{x:lx.toFixed(1),y:ly.toFixed(1),'text-anchor':'middle',
              'font-size':10,'font-weight':700,fill:'#fff'},
              (frac*100).toFixed(0)+'%');
          }
          a0=a1;
        });
        add('text',{x:cx,y:H-8,'text-anchor':'middle','font-size':10,
          fill:'#9aa4ad'},'Composition \u00b7 '+per2lab(lp)+
          ' \u00b7 positive values only');
      }
    } else if(ctype==='bar'&&!opts.mini&&onIdx.length){
      // grouped vertical bars for flow/delta series (e.g. Table 3)
      const bw=Math.min(slotW*0.8/onIdx.length,28);
      const groupw=bw*onIdx.length;
      const y0=y(0);
      ps.forEach((p,k)=>{
        const cx=xb(k);
        onIdx.forEach((i,bi)=>{
          const v=t.rows[p][i];
          if(typeof v!=='number')return;
          const bx=cx-groupw/2+bi*bw;
          const by=y(v);
          add('rect',{x:bx.toFixed(1),y:Math.min(by,y0).toFixed(1),
            width:Math.max(bw-1,1).toFixed(1),
            height:Math.abs(by-y0).toFixed(1),fill:PAL[i%8],opacity:.85});
        });
      });
    } else {
    t.columns.forEach((c,i)=>{
      if(!on[i])return;
      let d='',started=false,lastxy=null;
      ps.forEach((p,k)=>{const v=t.rows[p][i];
        if(typeof v!=='number'){started=false;return;}
        d+=(started?'L':'M')+x(k).toFixed(1)+' '+y(v).toFixed(1);
        lastxy=[x(k),y(v)];started=true;});
      if(opts.mini&&d){
        add('path',{d:d+'L'+(W-R)+' '+(H-B)+'L'+L+' '+(H-B)+'Z',
          fill:PAL[i%8],opacity:.07,stroke:'none'});
      }
      add('path',{d,fill:'none',stroke:PAL[i%8],
        'stroke-width':opts.mini?1.5:1.8,'stroke-linejoin':'round'});
      if(opts.mini&&lastxy)add('circle',{cx:lastxy[0],cy:lastxy[1],r:2.4,
        fill:PAL[i%8]});
    });
    }
    if(!opts.mini&&!on.some(Boolean)){
      add('text',{x:(L+W-R)/2,y:H/2,'text-anchor':'middle','font-size':13,
        fill:'#aab3bc'},'Tap or click a series name below to plot it');

    if(!opts.mini){

function insight(t){
  const ps=Object.keys(t.rows).sort();const last=ps[ps.length-1];
  let ci=t.columns.findIndex((c,i)=>typeof t.rows[last][i]==='number');
  if(ci<0)return '';
  const r=yoy(t,ci);
  let s='<b>'+t.columns[ci]+'</b>: '+fmt(r.v)+' ('+per2lab(last)+')';
  if(r.pct!=null){
    s+=' · '+(r.pct>=0?'+':'')+r.pct.toFixed(1)+'% YoY';
    return '<div class="insight'+(Math.abs(r.pct)>10?'':' gray')+'">'+s+'</div>';
  }
  return '<div class="insight gray">'+s+'</div>';
}

/* ---------- overview ---------- */
function momDeltas(t,ci){
  // returns {v, mom, vs3} in percent, from monthly periods only
  const ps=Object.keys(t.rows).sort()
    .filter(p=>/^\d{4}-\d{2}$/.test(p)&&typeof t.rows[p][ci]==='number');
  const n=ps.length;if(n<2)return null;
  const v=t.rows[ps[n-1]][ci];
  const pct=(a,b)=>(typeof b==='number'&&b)?(a-b)/Math.abs(b)*100:null;
  const mom=pct(v,t.rows[ps[n-2]][ci]);
  let vs3=null;
  if(n>=4){const a3=(t.rows[ps[n-2]][ci]+t.rows[ps[n-3]][ci]+t.rows[ps[n-4]][ci])/3;
    vs3=pct(v,a3);}
  return {v,mom,vs3,period:ps[n-1]};
}
function overview(main){
  const card=document.createElement('div');card.className='card';
  card.innerHTML='<div class="cardhead"><h2>Headline series</h2>'+
    '<span class="badge red">latest month</span></div>'+
    '<div class="cardsub">Month-on-month and vs prior 3-month average · '+
    'click a card to open the full table</div>'+
    '<div class="grid4" id="ovgrid"></div>';
  main.appendChild(card);
  const grid=card.querySelector('#ovgrid');
  for(const [lbl,tid,ci] of DATA.kpis){
    const t=DATA.tables[tid];if(!t)continue;
    const d=momDeltas(t,ci);if(!d)continue;
    const chip=(p,k)=>p==null?'':'<div class="dlt '+
      (p>0.05?'up':p<-0.05?'dn':'fl')+'">'+(p>0?'▲ ':p<0?'▼ ':'')+
      Math.abs(p).toFixed(1)+'% '+k+'</div>';
    const el=document.createElement('div');el.className='mini';
    el.innerHTML='<div class="lbl">'+lbl+'</div>'+
      '<div class="big num">'+fmt(d.v)+'</div>'+chip(d.mom,'MoM')+
      chip(d.vs3,'vs 3M avg');
    el.onclick=()=>show(tid);
    grid.appendChild(el);
    chart(el,{columns:t.columns,rows:t.rows},{mini:true,only:[ci]});
  }
  // movers - ranked by month-on-month change
  const mv=[];
  for(const tid in DATA.tables){
    const t=DATA.tables[tid];
    if(t.layout==='raw'||t.derived||NO_MOVERS.has(tid))continue;
    t.columns.forEach((c,ci)=>{
      const d=momDeltas(t,ci);
      if(d&&d.mom!=null&&typeof d.v==='number'&&Math.abs(d.v)>=100)
        mv.push({tid,c,v:d.v,mom:d.mom,vs3:d.vs3});
    });
  }
  // guard against percentage artifacts on small/volatile bases: require the
  // prior-month level to be material (>=100) and the absolute change to matter
  const mv2=[];
  for(const tid in DATA.tables){
    const t=DATA.tables[tid];
    if(t.layout==='raw'||t.derived||NO_MOVERS.has(tid))continue;
    if(MOVERS_EXCLUDE_IDS.has(tid))continue;
    const ps=Object.keys(t.rows).sort().filter(p=>/^\d{4}-\d{2}$/.test(p));
    if(ps.length<2)continue;
    const last=ps[ps.length-1],prev=ps[ps.length-2];
    t.columns.forEach((c,ci)=>{
      const v=t.rows[last][ci],pv=t.rows[prev][ci];
      if(typeof v!=='number'||typeof pv!=='number')return;
      if(Math.abs(pv)<100||Math.abs(v)<100)return;   // material base both ends
      const mom=(v-pv)/Math.abs(pv)*100;
      if(Math.abs(v-pv)<50)return;                   // material KD change
      let vs3=null;
      if(ps.length>=4){const a3=(t.rows[ps[ps.length-2]][ci]+
        t.rows[ps[ps.length-3]][ci]+t.rows[ps[ps.length-4]][ci])/3;
        if(a3)vs3=(v-a3)/Math.abs(a3)*100;}
      mv2.push({tid,c,v,mom,vs3});
    });
  }
  mv.length=0;mv2.forEach(x=>mv.push(x));
  mv.sort((a,b)=>Math.abs(b.mom)-Math.abs(a.mom));
  const card2=document.createElement('div');card2.className='card quiet';
  card2.innerHTML='<div class="cardhead"><h2>Biggest month-on-month movers</h2>'+
    '<span class="badge gray">auto-flagged</span></div>'+
    '<div class="cardsub">Across all KD-million series · latest month vs prior '+
    'month, with deviation from the 3-month average · material balances and moves only (≥ KD 100 mn level, ≥ KD 50 mn change)</div>'+
    '<div class="movers"></div>';
  main.appendChild(card2);
  const list=card2.querySelector('.movers');
  for(const m of mv.slice(0,12)){
    const row=document.createElement('div');row.className='mv';
    const v3=m.vs3==null?'':'<span class="pc '+(m.vs3>0?'up':'dn')+'" '+
      'style="font-weight:600;opacity:.75">'+(m.vs3>0?'+':'')+m.vs3.toFixed(1)+
      '% v3M</span>';
    row.innerHTML='<span class="tid">'+m.tid+'</span>'+
      '<span class="nm" title="'+m.c+'">'+m.c+
      ' <span style="color:var(--faint)">· '+DATA.tables[m.tid].title.slice(0,40)+'</span></span>'+
      '<span class="vv num">'+fmt(m.v)+'</span>'+v3+
      '<span class="pc '+(m.mom>0?'up':'dn')+'">'+(m.mom>0?'+':'')+m.mom.toFixed(1)+'% MoM</span>'+
      '<span class="badge '+(Math.abs(m.mom)>5?'red':'gray')+'">'+
      (Math.abs(m.mom)>5?'alert':'watch')+'</span>';
    row.onclick=()=>show(m.tid);
    list.appendChild(row);
  }
}

/* ---------- treasury briefing ---------- */
function briefBadge(pct,override){
  // Clear build: show a neutral factual YoY figure, never a judgement word
  if(DATA.profile==='mmc'){
    if(pct==null)return {cls:'gray',txt:'series'};
    return {cls:'gray',txt:(pct>0?'+':'')+pct.toFixed(1)+'% YoY'};
  }
  if(override)return {cls:override.toLowerCase()==='alert'?'red':
    override.toLowerCase()==='watch'?'amber':'gray',txt:override};
  if(pct==null)return {cls:'gray',txt:'series'};
  const a=Math.abs(pct);
  if(a>=BRIEF.thresholds.alert)return {cls:'red',txt:'alert'};
  if(a>=BRIEF.thresholds.watch)return {cls:'amber',txt:'watch'};
  return {cls:'gray',txt:'stable'};
}

       '</span>':stat)+'</div>');

}

/* ---------- GM scorecard ---------- */
function sparkHTML(pts){
  if(!pts||pts.length<2)return '<span class="aspark"></span>';
  const vals=pts.map(p=>p[1]);
  const lo=Math.min(...vals),hi=Math.max(...vals),rng=(hi-lo)||1;
  const W=104,H=30,P=3;
  const x=i=>P+(W-2*P)*i/(pts.length-1);
  const y=v=>P+(H-2*P)*(1-(v-lo)/rng);
  const last=vals[vals.length-1]-vals[vals.length-2];
  const col=Math.abs(last)<1e-9?'#8a93' : last>0?'#2e7d4f':'#bf3a30';
  let d='';pts.forEach((p,i)=>d+=(i?'L':'M')+x(i).toFixed(1)+' '+y(p[1]).toFixed(1));
  const lx=x(pts.length-1),ly=y(vals[vals.length-1]);
  const area=d+'L'+lx.toFixed(1)+' '+(H-P)+'L'+x(0).toFixed(1)+' '+(H-P)+'Z';
  const months=pts.map(p=>{const m=+p[0].slice(5);
    return ['','J','F','M','A','M','J','J','A','S','O','N','D'][m];}).join(' ');
  return '<span class="aspark"><div class="cap">'+months+'</div>'+
    '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">'+
    '<path d="'+area+'" fill="'+col+'" opacity="0.08"/>'+
    '<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="1.6" '+
    'stroke-linejoin="round"/><circle cx="'+lx.toFixed(1)+'" cy="'+ly.toFixed(1)+
    '" r="2.3" fill="'+col+'"/></svg>'+
    '<div class="d" style="color:'+col+'">'+(last>0?'+':'')+
    (Math.abs(last)>=10?Math.round(last):last.toFixed(2))+' MoM</div></span>';
}


function buildHeadline(sc){
  const tone=c=>'<span class="'+(c==='green'?'g':c==='amber'?'a':'r')+'">';
  const lab=a=>a.map(s=>s.label.toLowerCase()).join(' and ');
  const join=(verb1,verb2,a)=>lab(a)+' '+(a.length>1?verb2:verb1);
  // each signal lands in exactly one bucket, worst-first
  const red=sc.filter(s=>s.status==='red');
  const amberWorse=sc.filter(s=>s.status==='amber'&&!s.improving);
  const amberBetter=sc.filter(s=>s.status==='amber'&&s.improving);
  const greenWorse=sc.filter(s=>s.status==='green'&&s.worsening);
  let parts=[];
  if(red.length)parts.push(tone('red')+join('requires','require',red)+
    '</span> action');
  if(amberWorse.length)parts.push(tone('amber')+join('is','are',amberWorse)+
    '</span> on watch');
  if(amberBetter.length)parts.push(tone('amber')+join('is','are',amberBetter)+
    '</span> on watch but easing');
  let sentence=parts.length?(parts.join('; ')+'.'):
    ('All key funding and margin signals are '+tone('green')+
     'within normal ranges</span>.');
  let tail='';
  if(greenWorse.length)tail=' Early drift worth noting in '+
    tone('amber')+lab(greenWorse)+'</span>.';
  return sentence+tail;
}

/* ---------- group digest ---------- */
function topMover(t){
  const ps=Object.keys(t.rows).sort();
  if(ps.length<2)return null;
  const a=t.rows[ps[ps.length-2]],b=t.rows[ps[ps.length-1]];
  let best=null;
  t.columns.forEach((c,i)=>{
    const x=a[i],y=b[i];
    if(typeof x==='number'&&typeof y==='number'&&Math.abs(x)>1){
      const p=(y-x)/Math.abs(x)*100;
      if(!best||Math.abs(p)>Math.abs(best.p))best={c,p,y};
    }
  });
  return best;
}
function groupPage(main,gname,ids){
  const card=document.createElement('div');card.className='card';
  card.innerHTML='<div class="cardhead"><h2>'+gname+' — highlights</h2>'+
    '<span class="badge red">latest month</span></div>'+
    '<div class="cardsub">Per-table digest · primary series with MoM / '+
    'YoY / vs 3M average · click any table name for full detail</div>'+
    '<div class="gcards"></div>';
  main.appendChild(card);
  const grid=card.querySelector('.gcards');
  for(const tid of ids){
    const t=DATA.tables[tid];if(!t)continue;
    const g=document.createElement('div');g.className='gcard';
    const ttl='<span class="ttl" onclick="show(\''+tid+'\')">'+
      '<span class="tid">'+tid+'</span>'+
      (t.title.length>52?t.title.slice(0,51)+'…':t.title)+'</span>';
    if(t.layout==='raw'){
      g.innerHTML='<div class="ghead">'+ttl+
        '<span class="badge gray">as published</span></div>'+
        '<div class="gsub">Non-monthly layout · latest snapshot '+t.ref+'</div>';
      grid.appendChild(g);continue;
    }
    if(t.derived)g.title=t.note;
    const ps=Object.keys(t.rows).sort();const last=ps[ps.length-1];
    let ci=t.columns.findIndex((c,i)=>typeof t.rows[last][i]==='number');
    if(ci<0)ci=0;
    const d=kpiDeltas(t,ci);
    const pct=(d&&d.rows.find(r=>r[0]==='YoY'))?.[1];
    const b=briefBadge(pct==null?null:pct,'');
    g.innerHTML='<div class="ghead">'+ttl+
      '<span class="badge '+b.cls+'">'+b.txt+'</span></div>';
    grid.appendChild(g);
    chart(g,{columns:t.columns,rows:t.rows},{mini:true,only:[ci]});
    let stat='<b>'+fmt(d?d.v:null)+'</b> '+
      (t.columns[ci].length>30?t.columns[ci].slice(0,29)+'…':t.columns[ci])+
      ' ('+per2lab(last)+')';
    let sub=d?d.rows.map(([k,p])=>
      '<span class="'+(p>0.05?'up':p<-0.05?'dn':'fl')+'">'+
      (p>0?'+':'')+p.toFixed(1)+'% '+k+'</span>').join(' · '):'';
    const mv=topMover(t);
    if(mv&&mv.c!==t.columns[ci])
      sub+='<br>biggest move: '+(mv.c.length>30?mv.c.slice(0,29)+'…':mv.c)+
        ' <span class="'+(mv.p>0?'up':'dn')+'">'+(mv.p>0?'+':'')+
        mv.p.toFixed(1)+'% MoM</span>';
    g.insertAdjacentHTML('beforeend','<div class="gstat">'+stat+'</div>'+
      '<div class="gsub">'+sub+'</div>'+
      (DATA.revs[tid]?'<div class="grev">⚠ '+DATA.revs[tid]+
        ' figure(s) revised by CBK in the latest publication</div>':''));
    if(gname.indexOf('Focus')>=0)
      g.insertAdjacentHTML('beforeend',noteBox(tid,true));
  }
}

  if(id==='__cmp__'){bankCompare(main);try{window.scrollTo({top:0});}catch(e){}return;}

      'starred yet. Click the \u2606 next to any table in the sidebar to add '+

    try{window.scrollTo({top:0});}catch(e){}return;
  }
  if(id==='__sc__'){scorecard(main);try{window.scrollTo({top:0});}catch(e){}return;}
  if(id==='__br__'){briefing(main);try{window.scrollTo({top:0});}catch(e){}return;}
  if(id==='__ov__'){overview(main);try{window.scrollTo({top:0});}catch(e){}return;}
  const t=DATA.tables[id];
  if(!t)return;   // unknown id (e.g. table not in this build's profile)
  const card=document.createElement('div');
  card.className='card'+(PINS.includes(id)?'':' quiet');
  const raw=t.layout==='raw';
  card.innerHTML='<div class="cardhead"><h2>'+
    (t.derived?'':'Table '+id+' — ')+t.title+'</h2>'+
    '<span class="badge '+(PINS.includes(id)?'red':t.derived?'amber':'gray')+'">'+
    (PINS.includes(id)?'treasury pin':t.derived?'derived metric'
      :raw?'as published':'series')+'</span></div>'+
    '<div class="cardsub">'+(t.derived?t.note
      :raw?'Non-monthly layout · latest published snapshot ('+t.ref+')'
      :'Stitched monthly series · KD million unless stated')+'</div>'+
    (t.derived&&t.formula?'<div class="calcbox"><span class="calclbl">'+
      'How it\u2019s calculated</span>'+t.formula+'</div>':'');
  main.appendChild(card);
  if(!raw){
    chart(card,t,{tid:id});
    card.insertAdjacentHTML('beforeend',insight(t));

  const ps=raw?null:filt(Object.keys(t.rows).sort());
  let html='<div class="tblwrap"><table><thead>'+
    headerRows(t.columns,raw?'Description':'Period')+'</thead><tbody>';
  const rows=raw?t.raw:ps.map(p=>[per2lab(p)].concat(t.rows[p]));
  for(const r of rows){
    html+='<tr><td>'+r[0]+'</td>'+r.slice(1).map(v=>'<td class="'+
      (typeof v==='number'&&v<0?'neg':'')+'">'+
      (typeof v==='number'&&v<0?'('+fmt(-v)+')':fmt(v))+'</td>').join('')+'</tr>';
  }
  html+='</tbody>';
  const sh=raw?'':summaryHeadFor(id);
  if(sh){
    html+='<tfoot><tr class="sumtoprow"><td class="sumtop">'+('as of '+(
      Object.keys(t.rows).filter(p=>/^\d{4}-\d{2}$/.test(p)).sort().slice(-1)[0]||''
      ).replace(/(\d{4})-(\d{2})/,(m,y,mo)=>per2lab(y+'-'+mo)))+
      '</td>'+t.columns.map(c=>'<td class="sumtop"></td>').join('')+'</tr>'+
      sh+'</tfoot>';
  }
  card.insertAdjacentHTML('beforeend',
    '<div class="tbltools"><button class="xpd" '+
    'onclick="expandTable(\''+id+'\')">\u21f1 Expand table</button>'+
    '<button class="xpd" onclick="downloadCSV(\''+id+'\')">\u2193 CSV (all history)</button>'+
    '</div>'+html+'</table></div>');
  if(FOCUS.includes(id))card.insertAdjacentHTML('beforeend',noteBox(id));
  requestAnimationFrame(()=>stickyHeaderOffsets(card));
  try{window.scrollTo({top:0});}catch(e){}
}

// build the table HTML (summary rows + data) for a given id, reused by the
// in-page view and the expand overlay
function tableHTML(id){
  const t=DATA.tables[id];const raw=t.layout==='raw';
  const ps=raw?null:filt(Object.keys(t.rows).sort());
  let html='<table><thead>'+
    headerRows(t.columns,raw?'Description':'Period')+'</thead><tbody>';
  const rows=raw?t.raw:ps.map(p=>[per2lab(p)].concat(t.rows[p]));
  for(const r of rows){
    html+='<tr><td>'+r[0]+'</td>'+r.slice(1).map(v=>'<td class="'+
      (typeof v==='number'&&v<0?'neg':'')+'">'+
      (typeof v==='number'&&v<0?'('+fmt(-v)+')':fmt(v))+'</td>').join('')+'</tr>';
  }
  html+='</tbody>';
  const sh=raw?'':summaryHeadFor(id);
  if(sh)html+='<tfoot>'+sh+'</tfoot>';
  return html+'</table>';
}
function expandTable(id){
  const t=DATA.tables[id];

  if(!ov){ov=document.createElement('div');ov.id='tovl';document.body.appendChild(ov);}

    t.title+'</span><button onclick="closeOvl()">\u2715 Close (Esc)</button></div>'+
    '<div class="ovbody"><div class="tblwrap">'+tableHTML(id)+'</div></div>';

function closeOvl(){const o=document.getElementById('tovl');if(o)o.style.display='none';}
function downloadCSV(id){
  const t=DATA.tables[id];const raw=t.layout==='raw';
  const head=[raw?'Description':'Period'].concat(t.columns);
  const lines=[head.map(csvq).join(',')];
  if(raw){t.raw.forEach(r=>lines.push(r.map(csvq).join(',')));}
  else{Object.keys(t.rows).filter(p=>/^\d{4}-\d{2}$/.test(p)).sort()
    .forEach(p=>lines.push([p].concat(t.rows[p]).map(csvq).join(',')));}
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='CBK_'+id+'.csv';a.click();
}
function csvq(v){
  if(v==null)return '';
  const s=''+v;
  return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
}
